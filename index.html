<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FBJ Financial Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744;--navy-light:#223260;--gold:#c9a227;--gold-light:#e8c040;
  --white:#ffffff;--grey-bg:#f5f5f5;--grey-border:#e0e0e0;--grey-mid:#888;
  --red:#c0392b;--green:#27ae60;--green-light:#2ecc71;
  --amber:#e67e22;--amber-bg:#fef9ee;--teal:#16a085;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--grey-bg);color:#1a1a1a;font-size:14px;line-height:1.5}
/* HEADER */
.app-header{background:var(--navy);color:var(--white);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;border-bottom:3px solid var(--gold)}
.header-brand{display:flex;align-items:baseline;gap:10px}
.header-brand h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header-brand span{font-size:12px;color:#aab;font-weight:400}
.internal-badge{background:rgba(201,162,39,.2);border:1px solid var(--gold);color:var(--gold);font-size:11px;font-weight:600;padding:3px 10px;border-radius:3px;letter-spacing:.5px}
/* NAV */
nav{background:var(--navy-light);padding:0 32px;display:flex;gap:0;border-bottom:1px solid #1a2744}
.tab-btn{background:none;border:none;color:#8899bb;font-family:var(--font);font-size:13px;font-weight:500;padding:14px 22px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;letter-spacing:.2px}
.tab-btn:hover{color:var(--white);background:rgba(255,255,255,.05)}
.tab-btn.active{color:var(--white);border-bottom-color:var(--gold)}
/* CONTENT */
#content{padding:28px 32px;min-height:calc(100vh - 113px)}
/* CARDS */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--white);border-radius:6px;padding:20px 20px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.kpi-card.gold::before{background:var(--gold)}
.kpi-card.navy::before{background:var(--navy)}
.kpi-card.green::before{background:var(--green)}
.kpi-card.teal::before{background:var(--teal)}
.kpi-label{font-size:11px;font-weight:600;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:700;color:var(--navy);font-family:var(--mono);letter-spacing:-1px}
.kpi-value.positive{color:var(--green)}
.kpi-value.negative{color:var(--red)}
.kpi-sub{font-size:11px;color:var(--grey-mid);margin-top:4px}
/* ASSUMPTIONS PANEL */
.assumptions-panel{background:var(--white);border-radius:6px;border:1px solid var(--grey-border);margin-bottom:20px;overflow:hidden}
.assumptions-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-bottom:1px solid var(--grey-border)}
.assumptions-header:hover{background:#fafafa}
.assumptions-title{font-weight:600;font-size:13px;color:var(--navy)}
.assumptions-toggle{font-size:12px;color:var(--grey-mid)}
.assumptions-body{padding:20px;display:none}
.assumptions-body.open{display:block}
.assumptions-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.assumptions-table th{text-align:left;padding:7px 12px;background:var(--grey-bg);font-weight:600;color:var(--navy);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--grey-border)}
.assumptions-table td{padding:7px 12px;border-bottom:1px solid var(--grey-border);font-family:var(--mono);font-size:12px}
.assumptions-table tr:last-child td{border-bottom:none}
.assumptions-table .margin-col{color:var(--green);font-weight:600}
.assumptions-note{font-size:11px;color:var(--grey-mid);font-style:italic;padding:8px 12px;background:#fafafa;border-radius:4px;border-left:3px solid var(--gold)}
/* NARRATIVE BANNER */
.narrative-banner{background:var(--navy);color:var(--white);padding:14px 20px;border-radius:6px;margin-bottom:20px;font-size:13px;border-left:4px solid var(--gold)}
.narrative-banner strong{color:var(--gold)}
/* RISK CALLOUT */
.risk-callout{background:var(--amber-bg);border:1px solid var(--amber);border-left:4px solid var(--amber);border-radius:6px;padding:14px 18px;margin-top:20px;font-size:13px;color:#6d3d00}
.risk-callout strong{color:var(--amber)}
/* REVENUE MIX */
.section-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.rev-mix-container{background:var(--white);border-radius:6px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:8px}
.rev-mix-bar{display:flex;height:32px;border-radius:4px;overflow:hidden;margin-bottom:12px}
.rev-mix-segment{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:white;transition:width .3s;overflow:hidden;white-space:nowrap;padding:0 4px}
.rev-mix-legend{display:flex;flex-wrap:wrap;gap:10px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#444}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* CHART CONTAINERS */
.chart-container{background:var(--white);border-radius:6px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px}
.chart-wrap{position:relative;height:220px}
/* SCENARIOS */
.scenario-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px}
.scenario-card{background:var(--white);border-radius:6px;border:2px solid var(--grey-border);padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;transition:box-shadow .15s}
.scenario-card.selected-base{border-color:var(--green)}
.scenario-card.selected-downside{border-color:var(--red)}
.scenario-card.selected-upside{border-color:var(--gold)}
.scenario-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12)}
.scenario-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.scenario-label.base{color:var(--green)}
.scenario-label.downside{color:var(--red)}
.scenario-label.upside{color:var(--gold)}
.scenario-narrative{font-size:12px;color:#555;line-height:1.6;margin-bottom:16px;min-height:72px}
.scenario-kpis{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.scenario-kpi{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--grey-border);padding-bottom:8px}
.scenario-kpi:last-child{border-bottom:none;padding-bottom:0}
.s-kpi-label{font-size:11px;color:var(--grey-mid);font-weight:500}
.s-kpi-value{font-family:var(--mono);font-size:15px;font-weight:700}
.s-kpi-value.pos{color:var(--green)}
.s-kpi-value.neg{color:var(--red)}
.s-kpi-value.neu{color:var(--navy)}
.scenario-cta{background:var(--grey-bg);border:1px solid var(--grey-border);border-radius:4px;padding:8px 14px;font-family:var(--font);font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;width:100%;transition:all .15s}
.scenario-cta:hover{background:var(--navy);color:var(--white)}
/* MONTHLY P&L TABLE */
.pl-controls{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pl-scenario-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid}
.pl-scenario-badge.base{color:var(--green);border-color:var(--green);background:rgba(39,174,96,.08)}
.pl-scenario-badge.downside{color:var(--red);border-color:var(--red);background:rgba(192,57,43,.08)}
.pl-scenario-badge.upside{color:var(--amber);border-color:var(--amber);background:rgba(230,126,34,.08)}
.pl-table-wrap{background:var(--white);border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow-x:auto}
.pl-table{width:100%;border-collapse:collapse;font-size:11.5px;min-width:1200px}
.pl-table th{background:var(--navy);color:var(--white);padding:9px 10px;text-align:right;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;position:sticky;top:0;z-index:1}
.pl-table th:first-child,.pl-table th:nth-child(2),.pl-table th:nth-child(3){text-align:left}
.pl-table td{padding:7px 10px;text-align:right;border-bottom:1px solid #f0f0f0;font-family:var(--mono);font-size:11px;white-space:nowrap}
.pl-table td:first-child,.pl-table td:nth-child(2){text-align:left;font-family:var(--font)}
.pl-table td:nth-child(3){text-align:right;font-family:var(--mono)}
.pl-table tbody tr:nth-child(even){background:#fafafa}
.pl-table tbody tr:hover{background:#f0f4ff}
.pl-table .break-even-row{background:#fef9ee !important;border-left:4px solid var(--amber)}
.pl-table .break-even-row td{border-bottom:1px solid #f5e6c0}
.phase-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.5px}
.phase-ramp{background:#fff3e0;color:#e65100}
.phase-growth{background:#e0f7f4;color:var(--teal)}
.phase-scale{background:#e8f5e9;color:var(--green)}
.net-pos{color:var(--green);font-weight:600}
.net-neg{color:var(--red);font-weight:600}
.cum-net{font-weight:700}
/* INPUTS */
.inputs-warning{background:var(--amber-bg);border:1px solid var(--amber);border-left:4px solid var(--amber);border-radius:6px;padding:12px 18px;margin-bottom:20px;font-size:12px;color:#6d3d00}
.inputs-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.input-section{background:var(--white);border-radius:6px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.input-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--navy);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--gold)}
.input-row{margin-bottom:16px}
.input-label{font-size:12px;font-weight:600;color:#333;margin-bottom:2px}
.input-sublabel{font-size:10.5px;color:var(--grey-mid);font-style:italic;margin-bottom:6px;line-height:1.4}
.input-row input[type=range]{width:100%;accent-color:var(--navy);height:4px;cursor:pointer}
.input-row input[type=number],.input-row input[type=text]{border:1px solid var(--grey-border);border-radius:4px;padding:6px 10px;font-family:var(--mono);font-size:12px;width:100%;color:var(--navy)}
.input-row input[type=number]:focus,.input-row input[type=text]:focus{outline:2px solid var(--gold);border-color:var(--gold)}
.slider-val{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--navy);float:right}
/* Custom slider with markers */
.slider-with-markers{position:relative;margin-top:4px}
.slider-markers-row{display:flex;position:relative;height:22px;margin-bottom:2px}
.slider-marker{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%)}
.slider-marker-tick{width:1px;height:8px;background:var(--grey-mid)}
.slider-marker-label{font-size:9px;color:var(--grey-mid);white-space:nowrap;margin-top:1px;font-weight:500}
/* COST TOGGLE */
.cost-toggle{display:flex;border:1px solid var(--grey-border);border-radius:4px;overflow:hidden;margin-bottom:4px}
.cost-toggle-btn{flex:1;padding:8px 12px;border:none;background:var(--grey-bg);font-family:var(--font);font-size:12px;font-weight:500;color:#555;cursor:pointer;transition:all .15s}
.cost-toggle-btn.active{background:var(--navy);color:var(--white);font-weight:600}
/* PRICING TABLE */
.pricing-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
.pricing-table th{background:var(--grey-bg);padding:6px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;color:var(--navy);letter-spacing:.4px;border-bottom:2px solid var(--grey-border)}
.pricing-table td{padding:5px 8px;border-bottom:1px solid var(--grey-border)}
.pricing-table td input[type=number]{border:1px solid var(--grey-border);border-radius:3px;padding:3px 6px;font-family:var(--mono);font-size:11px;width:72px;color:var(--navy)}
.pricing-table td:first-child{font-size:11px;color:#555}
/* NOTE CALLOUT */
.note-callout{background:#f0f4ff;border:1px solid #c0d0ff;border-radius:4px;padding:10px 14px;font-size:11.5px;color:#334;margin-top:8px;font-style:italic}
/* UTILS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.text-right{text-align:right}
.divider{border:none;border-top:1px solid var(--grey-border);margin:16px 0}
/* CHARTS on base case */
.charts-row{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:20px}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-brand">
      <h1>FBJ Financial Model</h1>
      <span>3PL Partnership Dashboard</span>
    </div>
    <span class="internal-badge">INTERNAL — FBJ LEADERSHIP</span>
  </header>
  <nav id="nav">
    <button class="tab-btn active" data-tab="base">Base Case</button>
    <button class="tab-btn" data-tab="scenarios">Scenarios</button>
    <button class="tab-btn" data-tab="pl">Monthly P&amp;L</button>
    <button class="tab-btn" data-tab="inputs">Inputs</button>
  </nav>
  <div id="content"></div>
</div>

<script>
// ─── TODO ITEMS (from PRD) ─────────────────────────────────────────────────
// TODO [DR to confirm]: Shipping margin corrected to $1.25/order (was $2.00 in original dashboard).
//   At 25K orders/mo that's a ~$5,625/mo difference — $135K over 24 months. Confirm before external use.
// TODO: B2B order volume not modeled separately. Tiny Cottons has 500 B2B orders/mo with pallet/case fee structure.
// TODO: Dual-WMS overhead cost not included. Running Amphora WMS alongside Shopify WMS has incremental tech cost.
// TODO: Amphora counter rates exclude returns, onboarding, and mgmt fees entirely.
// TODO: Storage SKU fee UOM mismatch — FBJ charges $12/SKU/month, Amphora counter is $6/linear ft.
// TODO: 5,000 orders/brand planning assumption vs ~2,300 Excel actual.

// ─── STATE ────────────────────────────────────────────────────────────────
const BASE_PARAMS = {
  starting_brands: 3, new_per_month: 2, orders_per_brand: 5000,
  fbj_legacy_start: 5000, fbj_legacy_growth: 0.05, avg_units: 2.2,
  ship_margin: 1.25,
  amphora_amphora_share: 0.30, amphora_fbj_share: 0.50, fbj_fbj_share: 0.70,
  direct_rates_month: 12,
  cost_mode: 'MARGINAL',
  wms_fee: 0.20, wms_threshold: 50000,
  integration_cost: 25000, integration_month: 6,
  tier1_order: 3.00, tier1_unit: 0.95,
  tier2_order: 2.90, tier2_unit: 0.85,
  tier3_order: 2.75, tier3_unit: 0.75,
  packaging_fee: 0.95,
  pallet_storage_rate: 28, sku_storage_rate: 12,
  inbound_rate: 2.75, inbound_cost_per: 1.73,
  returns_order_fee: 4.75, returns_item_fee: 1.25,
  return_rate: 0.15, avg_units_per_return: 1.7, returns_cost_per: 1.30,
  mgmt_fee: 350, onboarding_fee: 2000,
  pallets_per_brand: 15, skus_per_brand: 143, cases_per_brand: 340,
};

let P = {...BASE_PARAMS}; // live params (modified by Inputs screen)
let activeTab = 'base';
let selectedScenario = 'base'; // for Monthly P&L
let assumptionsOpen = true;
const chartInstances = {};

// ─── FINANCIAL MODEL ─────────────────────────────────────────────────────
function getTier(orders, p) {
  if (orders < 5000)  return { order: p.tier1_order, unit: p.tier1_unit };
  if (orders < 25000) return { order: p.tier2_order, unit: p.tier2_unit };
  return                     { order: p.tier3_order, unit: p.tier3_unit };
}

function computeMonth(m, p) {
  const amphora_brands = p.starting_brands + p.new_per_month * (m - 1);
  const new_brands_added = m === 1 ? p.starting_brands : p.new_per_month;
  const amphora_orders = amphora_brands * p.orders_per_brand;
  const fbj_orders = p.fbj_legacy_start * Math.pow(1 + p.fbj_legacy_growth, m - 1);
  const total_orders = amphora_orders + fbj_orders;

  const tier = getTier(total_orders, p);
  const fulfillment_rev = total_orders * (tier.order + p.avg_units * tier.unit + p.packaging_fee);

  const using_fbj_rates = m >= p.direct_rates_month;
  const a_share = using_fbj_rates ? p.amphora_fbj_share : p.amphora_amphora_share;
  const ship_rev = amphora_orders * p.ship_margin * a_share
                 + fbj_orders     * p.ship_margin * 1.00; // FBJ legacy = 100%

  const storage_rev = amphora_brands * p.pallets_per_brand * p.pallet_storage_rate
                    + amphora_brands * p.skus_per_brand    * p.sku_storage_rate;

  const cases_inbound = amphora_brands * p.cases_per_brand;
  const inbound_rev   = cases_inbound * p.inbound_rate;
  const inbound_cost  = cases_inbound * p.inbound_cost_per;

  const return_orders = total_orders * p.return_rate;
  const returns_rev   = return_orders * (p.returns_order_fee + p.avg_units_per_return * p.returns_item_fee);
  const returns_cost  = return_orders * p.returns_cost_per;

  const mgmt_rev      = amphora_brands * p.mgmt_fee;
  const onboarding_rev= new_brands_added * p.onboarding_fee;

  const total_rev = fulfillment_rev + ship_rev + storage_rev + inbound_rev
                  + returns_rev + mgmt_rev + onboarding_rev;

  const wms_cost   = total_orders > p.wms_threshold ? 0 : total_orders * p.wms_fee;
  const integration= m === p.integration_month ? p.integration_cost : 0;

  let total_cost;
  if (p.cost_mode === 'MARGINAL') {
    const overhead = total_orders * 0.25;
    total_cost = overhead + inbound_cost + returns_cost + wms_cost + integration;
  } else {
    const pick_cost  = total_orders * (2.48 + 0.363);
    const other_cost = total_rev * 0.05;
    total_cost = pick_cost + inbound_cost + returns_cost + wms_cost + integration + other_cost;
  }

  return {
    m, amphora_brands, new_brands_added,
    amphora_orders: Math.round(amphora_orders),
    fbj_orders: Math.round(fbj_orders),
    total_orders: Math.round(total_orders),
    fulfillment_rev, ship_rev, storage_rev, inbound_rev,
    returns_rev, mgmt_rev, onboarding_rev, total_rev,
    total_cost, monthly_net: total_rev - total_cost,
  };
}

function computeAll(p) {
  const months = [];
  let cumulative_net = 0, break_even_month = null;
  for (let m = 1; m <= 24; m++) {
    const d = computeMonth(m, p);
    cumulative_net += d.monthly_net;
    d.cumulative_net = cumulative_net;
    if (break_even_month === null && cumulative_net >= 0) break_even_month = m;
    months.push(d);
  }
  return { months, break_even_month };
}

function getScenarioParams(id) {
  const base = {...P};
  if (id === 'base') return base;
  if (id === 'downside') return {
    ...base, new_per_month: 1, direct_rates_month: 999,
    tier1_order: 0.55, tier1_unit: 0.45,
    tier2_order: 0.55, tier2_unit: 0.45,
    tier3_order: 0.55, tier3_unit: 0.45,
    pallet_storage_rate: 10, sku_storage_rate: 0,
    inbound_rate: 1.80, returns_order_fee: 0, returns_item_fee: 0, returns_cost_per: 0,
  };
  if (id === 'upside') return {
    ...base, new_per_month: 3, direct_rates_month: 9, fbj_legacy_growth: 0.10,
  };
}

// ─── FORMATTERS ──────────────────────────────────────────────────────────
function fmt(v) {
  const neg = v < 0, a = Math.abs(v);
  const sign = neg ? '−$' : '$';
  if (a >= 1e6) return sign + (a/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return sign + Math.round(a/1e3) + 'K';
  return (neg ? '−$' : '$') + a.toFixed(0);
}
function fmtK(v) {
  const neg = v < 0, a = Math.abs(v);
  if (a >= 1e6) return (neg?'−':'')+' $'+(a/1e6).toFixed(1)+'M';
  if (a >= 1e3) return (neg?'−':'')+' $'+Math.round(a/1e3)+'K';
  return (neg?'−':'')+' $'+a.toFixed(0);
}
function fmtN(v) { return Math.round(v).toLocaleString('en-US'); }
function pct(v) { return (v*100).toFixed(0)+'%'; }

// ─── PHASE ───────────────────────────────────────────────────────────────
function phase(m) {
  if (m <= 3) return {label:'RAMP',cls:'phase-ramp'};
  if (m <= 6) return {label:'GROWTH',cls:'phase-growth'};
  return {label:'SCALE',cls:'phase-scale'};
}

// ─── SCREEN 1: BASE CASE ─────────────────────────────────────────────────
function renderBaseCase() {
  const { months, break_even_month } = computeAll(P);
  const last = months[23];
  const cum24 = last.cumulative_net;
  const totalRev24 = months.reduce((s,d) => s+d.total_rev, 0);
  const revByStream = {
    fulfillment: months.reduce((s,d)=>s+d.fulfillment_rev,0),
    shipping:    months.reduce((s,d)=>s+d.ship_rev,0),
    storage:     months.reduce((s,d)=>s+d.storage_rev,0),
    inbound:     months.reduce((s,d)=>s+d.inbound_rev,0),
    returns:     months.reduce((s,d)=>s+d.returns_rev,0),

        <tr><td>Inbound receipts</td><td>$2.75/case</td><td>$1.73/case</td><td class="margin-col">~$1.02/case</td></tr>
        <tr><td>Returns handling</td><td>~$6.88/return</td><td>$1.30/return</td><td class="margin-col">~$5.58/return</td></tr>
        <tr><td>Account mgmt fees</td><td>$350/brand/mo</td><td>$0</td><td class="margin-col">$350/brand/mo</td></tr>
        <tr><td>Brand onboarding</td><td>$2,000/brand</td><td>$0</td><td class="margin-col">$2,000/brand</td></tr>
      </tbody>
    </table>
    <div class="assumptions-note">
      <strong>Volume:</strong> 5,000 orders/month per Amphora brand. Starting brands: ${P.starting_brands}. Adding ${P.new_per_month}/month.
      <em>David's Excel named-brand data implies ~2,300/brand actual — 5,000 is the planning assumption. Adjust in Inputs tab to stress-test.</em>
    </div>
  </div>
</div>

<div class="narrative-banner">
  <strong>Base case:</strong> FBJ onboards <strong>${P.starting_brands} Amphora brands</strong> at go-live, adds <strong>${P.new_per_month}/month</strong> at <strong>${fmtN(P.orders_per_brand)} orders/brand</strong>. FBJ secures direct carrier rates by <strong>Month ${P.direct_rates_month}</strong>. Marginal cost model (existing warehouse capacity). Shipping markup: <strong>$${P.ship_margin.toFixed(2)}/order</strong>.
</div>

<div class="kpi-row">

    <div class="kpi-sub">When cumulative net first ≥ $0</div>
  </div>
  <div class="kpi-card green">
    <div class="kpi-label">Peak Orders / Month</div>
    <div class="kpi-value">${fmtN(last.total_orders)}</div>
    <div class="kpi-sub">Month 24 total orders</div>
  </div>
  <div class="kpi-card teal">
    <div class="kpi-label">Peak Brands Active</div>
    <div class="kpi-value">${last.amphora_brands}</div>

<div class="charts-row">

    type: 'line',

        data: cumData,

          return g;

// ─── SCREEN 2: SCENARIOS ─────────────────────────────────────────────────
function renderScenarios() {
  const scenarios = [
    {id:'base', label:'Base Case', labelCls:'base', cardCls:'selected-base',
     narrative:'FBJ onboards 3 Amphora brands at launch, adds 2/month at 5K orders/brand. FBJ secures direct carrier rates Month 12 (50% share from then). Marginal cost model. $1.25 shipping margin.'},
    {id:'downside', label:'Downside', labelCls:'downside', cardCls:'selected-downside',
     narrative:'Amphora ramp is 50% slower — 1 new brand/month. FBJ never secures direct carrier rates (30% Amphora/Amphora share throughout all 24 months). Amphora counter rates accepted on fulfillment. $1.25 shipping margin.'},
    {id:'upside', label:'Upside', labelCls:'upside', cardCls:'selected-upside',
     narrative:'Strong Amphora ramp — 3 new brands/month. FBJ secures direct carrier rates by Month 9 (50% share from Month 9). FBJ legacy volume grows 10%/month. $1.25 shipping margin.'},
  ];

  const cardsHTML = scenarios.map(s => {
    const sp = getScenarioParams(s.id);
    const { months, break_even_month } = computeAll(sp);
    const last = months[23];
    const cum24 = last.cumulative_net;
    const isNeg = cum24 < 0;
    return `
<div class="scenario-card" id="sc-${s.id}" onclick="selectScenarioCard('${s.id}')">
  <div class="scenario-label ${s.labelCls}">${s.label}</div>
  <div class="scenario-narrative">${s.narrative}</div>
  <div class="scenario-kpis">
    <div class="scenario-kpi">
      <span class="s-kpi-label">24-Mo Cumulative Net</span>
      <span class="s-kpi-value ${isNeg?'neg':'pos'}">${fmt(cum24)}</span>
    </div>
    <div class="scenario-kpi">
      <span class="s-kpi-label">Break-Even Month</span>
      <span class="s-kpi-value neu">${break_even_month ? 'Month '+break_even_month : 'Beyond 24mo'}</span>
    </div>
    <div class="scenario-kpi">
      <span class="s-kpi-label">Peak Orders / Month</span>
      <span class="s-kpi-value neu">${fmtN(last.total_orders)}</span>
    </div>
    <div class="scenario-kpi">
      <span class="s-kpi-label">Peak Brands Active</span>
      <span class="s-kpi-value neu">${last.amphora_brands} brands</span>
    </div>
    <div class="scenario-kpi">
      <span class="s-kpi-label">Peak Monthly Rev</span>
      <span class="s-kpi-value pos">${fmt(last.total_rev)}</span>
    </div>
  </div>
  <button class="scenario-cta" onclick="event.stopPropagation();viewScenarioPL('${s.id}')">View monthly detail →</button>
</div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
<div class="scenario-grid">${cardsHTML}</div>
<div class="chart-container">
  <div class="section-title">Cumulative Net P&amp;L Comparison — All Scenarios</div>
  <div class="chart-wrap" style="height:240px"><canvas id="scenChart"></canvas></div>
</div>
  `;

  // Mark selected
  document.querySelectorAll('.scenario-card').forEach(el => {
    const id = el.id.replace('sc-','');
    const sc = scenarios.find(s=>s.id===id);
    if (id === selectedScenario) el.classList.add(sc.cardCls);
  });

  // Draw comparison chart
  const ctx = document.getElementById('scenChart').getContext('2d');
  if (chartInstances.scen) chartInstances.scen.destroy();
  const scenDefs = [
    { id:'base',     label:'Base Case',  color:'#27ae60' },
    { id:'downside', label:'Downside',   color:'#c0392b' },
    { id:'upside',   label:'Upside',     color:'#c9a227' },
  ];
  const labels = Array.from({length:24},(_,i)=>'M'+(i+1));
  chartInstances.scen = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: scenDefs.map(s => {
        const { months } = computeAll(getScenarioParams(s.id));
        return {
          label: s.label,
          data: months.map(d=>d.cumulative_net),
          borderColor: s.color,
          backgroundColor: 'transparent',
          borderWidth: 2, tension: 0.35, pointRadius: 1, pointHoverRadius: 4,
        };

    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { labels:{ font:{size:11}, boxWidth:20 } },
        tooltip: { callbacks:{ label: c => c.dataset.label+': '+fmt(c.raw) } }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:10}} },
        y: { ticks:{font:{size:10}, callback: v=>fmt(v)}, grid:{color:'#f0f0f0'} }
      }
    }
  });
}

function selectScenarioCard(id) {
  selectedScenario = id;

}

  selectedScenario = id;

}

    return `<tr class="${isBreak?'break-even-row':''}">

      ${mkSliderWithMarkers('fbj_fbj_share','FBJ Share — FBJ brand + FBJ rate',
        P.fbj_fbj_share, 0, 1, 0.01,
        'FBJ-sourced brands using FBJ direct rates.',
        [{v:0.60,l:'Conservative'},{v:0.70,l:'Base'},{v:0.80,l:'Optimistic'}],
        0, 1, v=>Math.round(v*100)+'%')}

      <div class="note-callout">FBJ legacy / JA own brands always = <strong>100% share</strong>. These are Jack Archer's pre-existing brands — no Amphora revenue split applies.</div>

      ${mkSlider('direct_rates_month','Month FBJ direct carrier rates secured',P.direct_rates_month,1,24,1,
        'Before this month: Amphora-brand orders use Amphora rate (30% share). From this month: FBJ direct rate applies (50% share).',
        [{v:9,l:'Upside'},{v:12,l:'Base'}],1,24)}
    </div>
  </div>
</div>`;
}

function mkSlider(key, label, val, min, max, step, sublabel, markers, mMin, mMax) {
  const id = 'sl_'+key;
  return `<div class="input-row">
    <div class="input-label">${label} <span class="slider-val" id="${id}_val">${val}</span></div>
    ${sublabel?`<div class="input-sublabel">${sublabel}</div>`:''}
    <div class="slider-with-markers">
      ${mkMarkers(markers,mMin,mMax)}
      <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}"
        oninput="document.getElementById('${id}_val').textContent=this.value;updateParam('${key}',+this.value)">
    </div>
  </div>`;
}

function mkSliderPct(key, label, val, min, max, step, sublabel, markers, mMin, mMax) {
  const id = 'sl_'+key;
  const display = Math.round(val*100)+'%';
  return `<div class="input-row">
    <div class="input-label">${label} <span class="slider-val" id="${id}_val">${display}</span></div>
    ${sublabel?`<div class="input-sublabel">${sublabel}</div>`:''}
    <div class="slider-with-markers">
      ${mkMarkers(markers,mMin,mMax,v=>Math.round(v*100)+'%')}
      <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}"
        oninput="document.getElementById('${id}_val').textContent=Math.round(this.value*100)+'%';updateParam('${key}',+this.value)">
    </div>
  </div>`;
}

function mkSliderWithMarkers(key, label, val, min, max, step, sublabel, markers, mMin, mMax, fmt2) {
  const id = 'sl_'+key;
  const display = fmt2(val);
  return `<div class="input-row">
    <div class="input-label">${label} <span class="slider-val" id="${id}_val">${display}</span></div>
    ${sublabel?`<div class="input-sublabel">${sublabel}</div>`:''}
    <div class="slider-with-markers">
      ${mkMarkers(markers,mMin,mMax,fmt2)}
      <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}"
        oninput="document.getElementById('${id}_val').textContent=(${fmt2.toString()})(+this.value);updateParam('${key}',+this.value)">
    </div>
  </div>`;
}

function mkMarkers(markers, mMin, mMax, fmtFn) {
  if (!markers || !markers.length) return '';
  const range = mMax - mMin;
  return `<div class="slider-markers-row">${markers.map(m=>{
    const pct2 = ((m.v - mMin)/range*100).toFixed(1);
    return `<div class="slider-marker" style="left:${pct2}%">
      <div class="slider-marker-tick"></div>
      <div class="slider-marker-label">${m.l}</div>
    </div>`;
  }).join('')}</div>`;
}

function mkNumInput(key, label, val, sublabel) {
  return `<div class="input-row">
    <div class="input-label">${label}</div>
    ${sublabel?`<div class="input-sublabel">${sublabel}</div>`:''}
    <input type="number" value="${val}" step="any"
      onchange="updateParam('${key}',+this.value)">
  </div>`;
}

// ─── PARAM UPDATES ────────────────────────────────────────────────────────
function updateParam(key, val) {
  P[key] = val;
  // Re-render current tab with updated data
  if (activeTab === 'base') renderBaseCase();
  else if (activeTab === 'scenarios') renderScenarios();
  else if (activeTab === 'pl') renderMonthlyPL();
  // inputs tab: no re-render needed (sliders update in place)
}

function setCostMode(mode) {
  P.cost_mode = mode;
  document.querySelectorAll('.cost-toggle-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.textContent.includes(mode==='MARGINAL'?'Marginal':'Fully'));
  });
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  if (tab === 'base')      renderBaseCase();
  else if (tab === 'scenarios') renderScenarios();
  else if (tab === 'pl')   renderMonthlyPL();
  else if (tab === 'inputs') renderInputs();
}

// ─── INIT ────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>switchTab(btn.dataset.tab));
});
renderBaseCase();
</script>
</body>
</html>
