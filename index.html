<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FBJ Financial Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744;--navy-light:#223260;--gold:#c9a227;--gold-light:#e8c040;
  --white:#fff;--grey-bg:#f4f5f7;--grey-border:#e2e4e8;--grey-mid:#7a7f8e;
  --red:#c0392b;--green:#27ae60;--amber:#e67e22;--amber-bg:#fef9ee;--teal:#16a085;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--grey-bg);color:#1a1a1a;font-size:14px;line-height:1.5;min-width:1100px}

/* ── HEADER ── */
.app-header{background:var(--navy);color:#fff;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px;border-bottom:3px solid var(--gold)}
.hb{display:flex;align-items:baseline;gap:10px}
.hb h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hb span{font-size:11px;color:#aab}
.badge{background:rgba(201,162,39,.18);border:1px solid var(--gold);color:var(--gold);font-size:10px;font-weight:700;padding:3px 10px;border-radius:3px;letter-spacing:.6px}

/* ── NAV ── */
nav{background:var(--navy-light);padding:0 28px;display:flex;border-bottom:1px solid #111d38}
.tab-btn{background:none;border:none;color:#8899bb;font-family:var(--font);font-size:13px;font-weight:500;padding:13px 20px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;letter-spacing:.1px}
.tab-btn:hover{color:#fff;background:rgba(255,255,255,.04)}
.tab-btn.active{color:#fff;border-bottom-color:var(--gold)}

/* ── LAYOUT ── */
#content{padding:20px 28px}
.dash-grid{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start}

/* ── PANELS ── */
.panel{background:#fff;border-radius:8px;border:1px solid var(--grey-border);overflow:hidden;margin-bottom:14px}
.panel-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-bottom:1px solid var(--grey-border)}
.panel-head:hover{background:#fafbfc}
.panel-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--navy)}
.panel-toggle{font-size:11px;color:var(--grey-mid)}
.panel-body{padding:16px}
.panel-body.closed{display:none}

/* ── SHIPPING HERO ── */
.ship-panel{background:#fff;border-radius:8px;border:2px solid var(--gold);margin-bottom:14px;overflow:hidden}
.ship-head{padding:12px 16px;background:linear-gradient(135deg,var(--navy) 0%,#223260 100%);display:flex;align-items:center;gap:10px}
.ship-head-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}
.ship-badge{background:var(--gold);color:var(--navy);font-size:9px;font-weight:800;padding:2px 7px;border-radius:2px;letter-spacing:.8px}
.ship-body{padding:16px}
.ship-impact{background:var(--grey-bg);border-radius:6px;padding:10px 14px;margin-top:14px;border-left:3px solid var(--gold)}
.ship-impact-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--grey-mid);margin-bottom:8px}
.ship-impact-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:12px}
.ship-impact-row:last-child{margin-bottom:0}
.ship-impact-label{color:#555}
.ship-impact-val{font-family:var(--mono);font-weight:600;color:var(--navy)}
.ship-impact-val.big{color:var(--green);font-size:13px}

/* ── INPUTS ── */
.inp-row{margin-bottom:14px}
.inp-row:last-child{margin-bottom:0}
.inp-label{font-size:12px;font-weight:600;color:#222;margin-bottom:1px;display:flex;justify-content:space-between;align-items:center}
.inp-label .cur-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--navy)}
.inp-sublabel{font-size:10.5px;color:var(--grey-mid);margin-bottom:6px;line-height:1.4;font-style:italic}

/* Slider scaffold */
.sl-wrap{position:relative;padding-bottom:18px}
.sl-track{position:relative}
input[type=range]{width:100%;accent-color:var(--navy);height:4px;cursor:pointer;display:block;margin:6px 0 2px}
.sl-scale{display:flex;justify-content:space-between;position:absolute;bottom:0;left:0;right:0;pointer-events:none}
.sl-scale span{font-size:9.5px;color:var(--grey-mid);font-family:var(--mono)}
.sl-markers{position:relative;height:16px;margin-bottom:2px}
.sl-mark{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%)}
.sl-mark-tick{width:1px;height:6px;background:#bbb}
.sl-mark-lbl{font-size:9px;color:#999;white-space:nowrap;margin-top:1px;font-weight:500}

/* Number inputs */
.num-inp{border:1px solid var(--grey-border);border-radius:4px;padding:6px 10px;font-family:var(--mono);font-size:12px;width:100%;color:var(--navy);background:#fff}
.num-inp:focus{outline:2px solid var(--gold);border-color:var(--gold)}

/* Pricing table */
.ptable{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:4px}
.ptable th{background:var(--grey-bg);padding:6px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--navy);border-bottom:2px solid var(--grey-border)}
.ptable td{padding:5px 8px;border-bottom:1px solid var(--grey-border)}
.ptable td:first-child{font-size:11px;color:#555}
.ptable input[type=number]{border:1px solid var(--grey-border);border-radius:3px;padding:3px 6px;font-family:var(--mono);font-size:11px;width:68px;color:var(--navy)}

/* Cost toggle */
.ctoggle{display:flex;border:1px solid var(--grey-border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.ctoggle-btn{flex:1;padding:7px 10px;border:none;background:var(--grey-bg);font-family:var(--font);font-size:11.5px;font-weight:500;color:#555;cursor:pointer;transition:all .15s;text-align:center}
.ctoggle-btn.active{background:var(--navy);color:#fff;font-weight:600}

/* Advanced toggle */
.adv-toggle{font-size:11px;color:var(--grey-mid);cursor:pointer;padding:8px 0 0;display:flex;align-items:center;gap:4px;user-select:none}
.adv-toggle:hover{color:var(--navy)}
.adv-body{display:none;padding-top:12px;border-top:1px dashed var(--grey-border);margin-top:12px}
.adv-body.open{display:block}

/* ── KPI CARDS ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.kpi{background:#fff;border-radius:8px;padding:16px 16px 13px;border:1px solid var(--grey-border);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.c-gold::before{background:var(--gold)}
.kpi.c-navy::before{background:var(--navy)}
.kpi.c-green::before{background:var(--green)}
.kpi.c-teal::before{background:var(--teal)}
.kpi.c-amber::before{background:var(--amber)}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.kpi-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--navy);letter-spacing:-1px;line-height:1}
.kpi-val.pos{color:var(--green)}
.kpi-val.neg{color:var(--red)}
.kpi-sub{font-size:10px;color:var(--grey-mid);margin-top:5px}

/* ── CHARTS ── */
.charts-row{display:grid;grid-template-columns:1.7fr 1fr;gap:14px;margin-bottom:14px}
.chart-panel{background:#fff;border-radius:8px;border:1px solid var(--grey-border);padding:16px}
.chart-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--navy);margin-bottom:12px}
.chart-wrap{position:relative;height:200px}

/* Revenue mix */
.rev-bar{display:flex;height:28px;border-radius:4px;overflow:hidden;margin-bottom:10px}
.rev-seg{display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;padding:0 4px}
.rev-legend{display:flex;flex-wrap:wrap;gap:8px}
.rev-leg-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#444}
.rev-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ── SCENARIOS ── */
.sc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:18px}
.sc-card{background:#fff;border-radius:8px;border:2px solid var(--grey-border);padding:20px;cursor:pointer;transition:box-shadow .15s}
.sc-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.sc-card.sel-base{border-color:var(--green)}
.sc-card.sel-downside{border-color:var(--red)}
.sc-card.sel-upside{border-color:var(--gold)}
.sc-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.sc-lbl.base{color:var(--green)}.sc-lbl.downside{color:var(--red)}.sc-lbl.upside{color:var(--gold)}
.sc-narr{font-size:11.5px;color:#555;line-height:1.6;margin-bottom:14px;min-height:72px}
.sc-kpis{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.sc-kpi{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--grey-border);padding-bottom:7px}
.sc-kpi:last-child{border-bottom:none;padding-bottom:0}
.sc-klbl{font-size:11px;color:var(--grey-mid)}
.sc-kval{font-family:var(--mono);font-size:14px;font-weight:700}
.sc-kval.pos{color:var(--green)}.sc-kval.neg{color:var(--red)}.sc-kval.neu{color:var(--navy)}
.sc-cta{background:var(--grey-bg);border:1px solid var(--grey-border);border-radius:4px;padding:7px 12px;font-family:var(--font);font-size:11.5px;font-weight:600;color:var(--navy);cursor:pointer;width:100%;transition:all .15s}
.sc-cta:hover{background:var(--navy);color:#fff}

/* ── P&L TABLE ── */
.pl-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sc-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid}
.sc-pill.base{color:var(--green);border-color:var(--green);background:rgba(39,174,96,.07)}
.sc-pill.downside{color:var(--red);border-color:var(--red);background:rgba(192,57,43,.07)}
.sc-pill.upside{color:var(--amber);border-color:var(--amber);background:rgba(230,126,34,.07)}
.tbl-wrap{background:#fff;border-radius:8px;border:1px solid var(--grey-border);overflow-x:auto}
.pl-tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:1150px}
.pl-tbl th{background:var(--navy);color:#fff;padding:8px 9px;text-align:right;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;position:sticky;top:0;z-index:1}
.pl-tbl th:nth-child(-n+3){text-align:left}
.pl-tbl td{padding:6px 9px;text-align:right;border-bottom:1px solid #f0f0f0;font-family:var(--mono);font-size:10.5px;white-space:nowrap}
.pl-tbl td:first-child{text-align:left;font-family:var(--font);font-weight:500}
.pl-tbl td:nth-child(2){text-align:left;font-family:var(--font)}
.pl-tbl td:nth-child(3){text-align:right}
.pl-tbl tbody tr:nth-child(even){background:#fafafa}
.pl-tbl tbody tr:hover{background:#eef3ff}
.pl-tbl .be-row{background:#fef9ee !important;border-left:3px solid var(--amber)}
.ph{display:inline-block;font-size:8.5px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.4px}
.ph-r{background:#fff3e0;color:#e65100}.ph-g{background:#e0f7f4;color:var(--teal)}.ph-s{background:#e8f5e9;color:var(--green)}
.npos{color:var(--green);font-weight:600}.nneg{color:var(--red);font-weight:600}
.cbold{font-weight:700}

/* ── NOTE ── */
.note{background:#f0f4ff;border:1px solid #c8d8ff;border-radius:4px;padding:9px 13px;font-size:11px;color:#334;margin-top:12px;font-style:italic}
.risk-box{background:var(--amber-bg);border:1px solid var(--amber);border-left:4px solid var(--amber);border-radius:6px;padding:12px 16px;font-size:12px;color:#6d3d00;margin-bottom:14px}

/* ── DIVIDER ── */
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--grey-mid);margin:16px 0 10px;padding-bottom:4px;border-bottom:1px solid var(--grey-border)}
</style>
</head>
<body>
<header class="app-header">
  <div class="hb"><h1>FBJ Financial Model</h1><span>3PL Partnership Dashboard</span></div>
  <span class="badge">INTERNAL — FBJ LEADERSHIP</span>
</header>
<nav id="nav">
  <button class="tab-btn active" data-tab="dash">Dashboard</button>
  <button class="tab-btn" data-tab="scenarios">Scenarios</button>
  <button class="tab-btn" data-tab="pl">Monthly P&amp;L</button>
</nav>
<div id="content"></div>

<script>
// ─── TODO: Shipping margin corrected to $1.25 (was $2.00). Confirm with DR before external use.
// ─── TODO: B2B order volume not modeled (Tiny Cottons 500 B2B orders/mo). Add in V2.
// ─── TODO: Dual-WMS overhead cost not confirmed with Amphora.
// ─── TODO: Storage SKU fee UOM mismatch — FBJ $12/SKU/mo vs Amphora $6/linear ft.
// ─── TODO: 5,000 orders/brand planning assumption vs ~2,300 Excel actual.

const BASE = {
  starting_brands:3, new_per_month:2, orders_per_brand:5000,
  fbj_legacy_start:5000, fbj_legacy_growth:.05, avg_units:2.2,
  ship_margin:1.25,
  aa_share:.30, af_share:.50, ff_share:.70,
  direct_month:12, cost_mode:'MARGINAL',
  wms_fee:.20, wms_threshold:50000, integ_cost:25000, integ_month:6,
  t1o:3.00,t1u:.95, t2o:2.90,t2u:.85, t3o:2.75,t3u:.75, pkg:.95,
  pallet_rate:28, sku_rate:12, inbound_rate:2.75, inbound_cost:1.73,
  ret_order:4.75, ret_item:1.25, ret_rate:.15, ret_units:1.7, ret_cost:1.30,
  mgmt_fee:350, onboard_fee:2000,
  pallets_pb:15, skus_pb:143, cases_pb:340,
};

let P = {...BASE};
let activeTab = 'dash';
let selScen = 'base';
const charts = {};

// ─── MODEL ───────────────────────────────────────────────────────────────
function tier(orders,p){
  if(orders<5000) return {o:p.t1o,u:p.t1u};
  if(orders<25000) return {o:p.t2o,u:p.t2u};
  return {o:p.t3o,u:p.t3u};
}
function calcMonth(m,p){
  const ab = p.starting_brands + p.new_per_month*(m-1);
  const nb = m===1?p.starting_brands:p.new_per_month;
  const ao = ab*p.orders_per_brand;
  const fo = p.fbj_legacy_start*Math.pow(1+p.fbj_legacy_growth,m-1);
  const to = ao+fo;
  const t  = tier(to,p);

  const rev_fulfill = to*(t.o+p.avg_units*t.u+p.pkg);
  const a_share = m>=p.direct_month ? p.af_share : p.aa_share;
  const rev_ship  = ao*p.ship_margin*a_share + fo*p.ship_margin*1.0;
  const rev_stor  = ab*p.pallets_pb*p.pallet_rate + ab*p.skus_pb*p.sku_rate;
  const cases     = ab*p.cases_pb;
  const rev_inb   = cases*p.inbound_rate;
  const cost_inb  = cases*p.inbound_cost;
  const rets      = to*p.ret_rate;
  const rev_ret   = rets*(p.ret_order+p.ret_units*p.ret_item);
  const cost_ret  = rets*p.ret_cost;
  const rev_mgmt  = ab*p.mgmt_fee;
  const rev_onb   = nb*p.onboard_fee;
  const total_rev = rev_fulfill+rev_ship+rev_stor+rev_inb+rev_ret+rev_mgmt+rev_onb;

  const wms   = to>p.wms_threshold?0:to*p.wms_fee;
  const integ = m===p.integ_month?p.integ_cost:0;
  let total_cost;
  if(p.cost_mode==='MARGINAL'){
    total_cost = to*.25+cost_inb+cost_ret+wms+integ;
  } else {
    total_cost = to*(2.48+.363)+cost_inb+cost_ret+wms+integ+total_rev*.05;
  }
  return {m,ab,nb,ao:Math.round(ao),fo:Math.round(fo),to:Math.round(to),
    rev_fulfill,rev_ship,rev_stor,rev_inb,rev_ret,rev_mgmt,rev_onb,
    total_rev,total_cost,net:total_rev-total_cost};
}
function calcAll(p){
  let cum=0,be=null;
  const months=[];
  for(let m=1;m<=24;m++){
    const d=calcMonth(m,p);
    cum+=d.net; d.cum=cum;
    if(be===null&&cum>=0)be=m;
    months.push(d);
  }
  return {months,be};
}
function scenParams(id){
  if(id==='base') return {...P};
  if(id==='downside') return {...P,new_per_month:1,direct_month:999,
    t1o:.55,t1u:.45,t2o:.55,t2u:.45,t3o:.55,t3u:.45,
    pallet_rate:10,sku_rate:0,inbound_rate:1.80,
    ret_order:0,ret_item:0,ret_cost:0};
  return {...P,new_per_month:3,direct_month:9,fbj_legacy_growth:.10};
}

// ─── FORMATTERS ──────────────────────────────────────────────────────────
function fm(v){
  const n=v<0,a=Math.abs(v);
  const s=n?'−$':'$';
  if(a>=1e6) return s+(a/1e6).toFixed(2)+'M';
  if(a>=1e3) return s+Math.round(a/1e3)+'K';
  return (n?'−$':'$')+a.toFixed(0);
}
function fk(v){
  const n=v<0,a=Math.abs(v);
  if(a>=1e6) return (n?'−':'')+'$'+(a/1e6).toFixed(1)+'M';
  if(a>=1e3) return (n?'−':'')+'$'+Math.round(a/1e3)+'K';
  return (n?'−$':'$')+a.toFixed(0);
}
function fn(v){return Math.round(v).toLocaleString('en-US')}
function ph(m){
  if(m<=3)return{l:'RAMP',c:'ph-r'};
  if(m<=6)return{l:'GROWTH',c:'ph-g'};
  return{l:'SCALE',c:'ph-s'};
}

// ─── SLIDER HELPER ───────────────────────────────────────────────────────
function mkSl(key,label,val,min,max,step,sub,marks,fmtFn,minLbl,maxLbl){
  const id='s_'+key;
  const display=fmtFn?fmtFn(val):val;
  const scaleMin=minLbl!==undefined?minLbl:min;
  const scaleMax=maxLbl!==undefined?maxLbl:max;
  const onInput=fmtFn
    ? `document.getElementById('v_${key}').textContent=(${fmtFn.toString()})(+this.value);updateP('${key}',+this.value)`
    : `document.getElementById('v_${key}').textContent=this.value;updateP('${key}',+this.value)`;
  let markHtml='';
  if(marks&&marks.length){
    const r=max-min;
    markHtml=`<div class="sl-markers">${marks.map(mk=>{
      const pct=((mk.v-min)/r*100).toFixed(1);
      return `<div class="sl-mark" style="left:${pct}%"><div class="sl-mark-tick"></div><div class="sl-mark-lbl">${mk.l}</div></div>`;
    }).join('')}</div>`;
  }
  return `<div class="inp-row">
    <div class="inp-label">${label}<span class="cur-val" id="v_${key}">${display}</span></div>
    ${sub?`<div class="inp-sublabel">${sub}</div>`:''}
    <div class="sl-wrap">
      ${markHtml}
      <div class="sl-track">
        <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" oninput="${onInput}">
      </div>
      <div class="sl-scale"><span>${scaleMin}</span><span>${scaleMax}</span></div>
    </div>
  </div>`;
}

// ─── SCREEN: DASHBOARD ───────────────────────────────────────────────────
function renderDash(){
  const {months,be}=calcAll(P);
  const last=months[23];
  const tot_rev=months.reduce((s,d)=>s+d.total_rev,0);
  const tot_net=last.cum;
  const tot_cost=months.reduce((s,d)=>s+d.total_cost,0);
  const margin_pct=(tot_net/tot_rev*100).toFixed(1);
  const avg_mo_net=tot_net/24;

  // Revenue mix
  const streams={
    Fulfillment:months.reduce((s,d)=>s+d.rev_fulfill,0),
    Shipping:months.reduce((s,d)=>s+d.rev_ship,0),
    Storage:months.reduce((s,d)=>s+d.rev_stor,0),
    Inbound:months.reduce((s,d)=>s+d.rev_inb,0),
    Returns:months.reduce((s,d)=>s+d.rev_ret,0),
    'Mgmt & Onb':months.reduce((s,d)=>s+d.rev_mgmt+d.rev_onb,0),
  };
  const colors=['#1a2744','#c9a227','#16a085','#8e44ad','#c0392b','#e67e22'];
  const skeys=Object.keys(streams);
  const svals=Object.values(streams);

  // Effective shipping rates
  const eff_aa=(P.ship_margin*P.aa_share).toFixed(3);
  const eff_af=(P.ship_margin*P.af_share).toFixed(3);
  const eff_leg=P.ship_margin.toFixed(3);
  const m1_ship=months[0].rev_ship;

  document.getElementById('content').innerHTML=`
<div class="dash-grid">
  <!-- LEFT: ASSUMPTIONS -->
  <div>
    <!-- SHIPPING HERO -->

function drawCumChart(months){
  const ctx=document.getElementById('cumChart').getContext('2d');
  if(charts.cum)charts.cum.destroy();
  const cumData=months.map(d=>d.cum);
  charts.cum=new Chart(ctx,{
    type:'line',
    data:{
      labels:months.map(d=>'M'+d.m),
      datasets:[{
        label:'Cumulative Net',data:cumData,
        borderColor:'#1a2744',
        backgroundColor:(c)=>{const g=c.chart.ctx.createLinearGradient(0,0,0,180);g.addColorStop(0,'rgba(26,39,68,.12)');g.addColorStop(1,'rgba(26,39,68,.01)');return g;},
        fill:true,tension:.35,borderWidth:2,pointRadius:2,pointHoverRadius:5,
        segment:{borderColor:c=>cumData[c.p0DataIndex]<0||cumData[c.p1DataIndex]<0?'#c0392b':'#27ae60'},
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' Net: '+fm(c.raw)}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:9}}},
        y:{ticks:{font:{size:9},callback:v=>fm(v)},grid:{color:'#f0f0f0'}}
      }
    }
  });
}

// ─── SCREEN: SCENARIOS ───────────────────────────────────────────────────
function renderScenarios(){
  const defs=[
    {id:'base',lc:'base',
     narr:'FBJ onboards 3 Amphora brands at launch, adds 2/month at 5K orders/brand. FBJ secures direct carrier rates Month 12 (50% share from then). Marginal cost model. $1.25 shipping margin.'},
    {id:'downside',lc:'downside',
     narr:'Amphora ramp is 50% slower — 1 new brand/month. FBJ never secures direct carrier rates (30% Amphora/Amphora share all 24 months). Amphora counter rates accepted on fulfillment. $1.25 shipping margin.'},
    {id:'upside',lc:'upside',
     narr:'Strong Amphora ramp — 3 new brands/month. FBJ secures direct carrier rates by Month 9 (50% share from Month 9). FBJ legacy volume grows 10%/month. $1.25 shipping margin.'},
  ];
  const labels={base:'Base Case',downside:'Downside',upside:'Upside'};

  const cards=defs.map(s=>{
    const {months,be}=calcAll(scenParams(s.id));
    const last=months[23];
    const cum=last.cum;
    const neg=cum<0;
    const sel=selScen===s.id?'sel-'+s.id:'';
    return `<div class="sc-card ${sel}" onclick="selCard('${s.id}')">
      <div class="sc-lbl ${s.lc}">${labels[s.id]}</div>
      <div class="sc-narr">${s.narr}</div>
      <div class="sc-kpis">
        <div class="sc-kpi"><span class="sc-klbl">24-Mo Cumulative Net</span><span class="sc-kval ${neg?'neg':'pos'}">${fm(cum)}</span></div>
        <div class="sc-kpi"><span class="sc-klbl">24-Mo Total Revenue</span><span class="sc-kval neu">${fm(months.reduce((a,d)=>a+d.total_rev,0))}</span></div>
        <div class="sc-kpi"><span class="sc-klbl">Peak Orders / Month</span><span class="sc-kval neu">${fn(last.to)}</span></div>
        <div class="sc-kpi"><span class="sc-klbl">Peak Brands Active</span><span class="sc-kval neu">${last.ab} brands</span></div>
        <div class="sc-kpi"><span class="sc-klbl">Month 24 Monthly Net</span><span class="sc-kval ${last.net>=0?'pos':'neg'}">${fm(last.net)}</span></div>
      </div>
      <button class="sc-cta" onclick="event.stopPropagation();goToPL('${s.id}')">View monthly detail →</button>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
<div class="sc-grid">${cards}</div>
<div class="chart-panel">
  <div class="chart-title">Cumulative Net P&amp;L — All Scenarios Compared</div>
  <div class="chart-wrap" style="height:220px"><canvas id="scenChart"></canvas></div>
</div>`;

  const ctx=document.getElementById('scenChart').getContext('2d');
  if(charts.scen)charts.scen.destroy();
  charts.scen=new Chart(ctx,{
    type:'line',
    data:{
      labels:Array.from({length:24},(_,i)=>'M'+(i+1)),
      datasets:[
        {label:'Base Case',  data:calcAll(scenParams('base')).months.map(d=>d.cum),    borderColor:'#27ae60',borderWidth:2,tension:.35,pointRadius:1,backgroundColor:'transparent'},
        {label:'Downside',   data:calcAll(scenParams('downside')).months.map(d=>d.cum),borderColor:'#c0392b',borderWidth:2,tension:.35,pointRadius:1,backgroundColor:'transparent'},
        {label:'Upside',     data:calcAll(scenParams('upside')).months.map(d=>d.cum),  borderColor:'#c9a227',borderWidth:2,tension:.35,pointRadius:1,backgroundColor:'transparent'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:11},boxWidth:18}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fm(c.raw)}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{ticks:{font:{size:9},callback:v=>fm(v)},grid:{color:'#f0f0f0'}}}
    }
  });
}

</div>
<div class="note">
  <strong>Shipping</strong> = FBJ's share of $${sp.ship_margin.toFixed(2)} markup only (not full carrier charge).
  <strong>Mgmt</strong> = monthly fees + onboarding fees for brands joined that month.
  Cost model: <strong>${sp.cost_mode==='MARGINAL'?'Marginal ($0.25/order overhead)':'Fully-Loaded ($2.843/order)'}</strong>.
</div>`;
}

// ─── INTERACTIONS ────────────────────────────────────────────────────────
let panelState={vol:true,rates:false,assump:false};

function togglePanel(id){
  panelState[id]=!panelState[id];
  const body=document.getElementById('body-'+id);
  const tgl=document.getElementById('tgl-'+id);
  if(panelState[id]){body.classList.remove('closed');tgl.textContent='▲';}
  else{body.classList.add('closed');tgl.textContent='▼';}
}

function toggleAdv(){
  const b=document.getElementById('adv-body');
  const open=b.classList.contains('open');
  b.classList.toggle('open');
  b.previousElementSibling.textContent=(open?'▶':'▼')+' Advanced (WMS, integration costs)';
}

function updateP(key,val){
  P[key]=val;
  if(activeTab==='dash') refreshDashKPIs();
  else if(activeTab==='scenarios') renderScenarios();
  else if(activeTab==='pl') renderPL();
}

function refreshDashKPIs(){
  // Lightweight update: recalc and update KPIs + chart + ship impact without full re-render
  const {months}=calcAll(P);
  const last=months[23];
  const tot_rev=months.reduce((s,d)=>s+d.total_rev,0);
  const tot_net=last.cum;
  const avg_mo=tot_net/24;
  const marg=(tot_net/tot_rev*100).toFixed(1);

  document.getElementById('k-net').textContent=fm(tot_net);
  document.getElementById('k-net').className='kpi-val '+(tot_net>=0?'pos':'neg');
  document.getElementById('k-rev').textContent=fm(tot_rev);
  document.getElementById('k-avg').textContent=fm(avg_mo);
  document.getElementById('k-ord').textContent=fn(last.to);
  document.getElementById('k-marg').textContent=marg+'%';

  // Ship impact
  document.getElementById('eff-aa').textContent='$'+(P.ship_margin*P.aa_share).toFixed(3);
  document.getElementById('eff-af').textContent='$'+(P.ship_margin*P.af_share).toFixed(3);
  document.getElementById('eff-leg').textContent='$'+P.ship_margin.toFixed(3);
  document.getElementById('eff-m1').textContent=fm(months[0].rev_ship);

  // Revenue mix bar
  const streams=[
    months.reduce((s,d)=>s+d.rev_fulfill,0),
    months.reduce((s,d)=>s+d.rev_ship,0),
    months.reduce((s,d)=>s+d.rev_stor,0),
    months.reduce((s,d)=>s+d.rev_inb,0),
    months.reduce((s,d)=>s+d.rev_ret,0),
    months.reduce((s,d)=>s+d.rev_mgmt+d.rev_onb,0),
  ];
  const colors=['#1a2744','#c9a227','#16a085','#8e44ad','#c0392b','#e67e22'];
  const labels=['Fulfillment','Shipping','Storage','Inbound','Returns','Mgmt & Onb'];
  const bar=document.getElementById('rev-bar');
  if(bar) bar.innerHTML=streams.map((v,i)=>{
    const w=(v/tot_rev*100).toFixed(1);
    return `<div class="rev-seg" style="width:${w}%;background:${colors[i]}" title="${labels[i]}: ${fm(v)}">${w>6?labels[i].split(' ')[0]:''}</div>`;
  }).join('');

  drawCumChart(months);
}

function setCost(mode){
  P.cost_mode=mode;
  document.querySelectorAll('.ctoggle-btn').forEach(b=>{
    b.classList.toggle('active',
      (mode==='MARGINAL'&&b.textContent.includes('Marginal'))||(mode==='FULLY_LOADED'&&b.textContent.includes('Fully')));
  });
  refreshDashKPIs();
}

function selCard(id){selScen=id;renderScenarios();}
function goToPL(id){selScen=id;switchTab('pl');}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  if(tab==='dash') renderDash();
  else if(tab==='scenarios') renderScenarios();
  else if(tab==='pl') renderPL();
}

document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
renderDash();
</script>
</body>
